version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: app_password

    volumes:
      - /opt/mysql/data:/var/lib/mysql

    networks:
      - app-net

networks:
  app-net:
    external: true
